<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: 'Space Mono', monospace; min-height: 100vh; }

    /* ── Login (full-screen centered) ───────────────── */
    #login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #login {
      width: 320px;
      border: 2px solid #fff;
      box-shadow: 4px 4px 0 #fff;
      padding: 1.5rem;
    }
    #login h1 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #333;
    }
    #login input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #000;
      border: 1px solid #fff;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      margin-bottom: 0.75rem;
      outline: none;
    }
    #login input::placeholder { color: #555; }
    #login input:focus { border-color: #fff; box-shadow: 2px 2px 0 #fff; }
    #login button {
      width: 100%;
      padding: 0.6rem;
      background: #fff;
      color: #111;
      border: 2px solid #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }
    #login button:hover { background: #ddd; }
    #login button:disabled { opacity: 0.5; cursor: default; }
    #login-error { color: #f55; font-size: 11px; margin-top: 0.5rem; min-height: 1em; }

    /* ── Queue (moderation list) ─────────────────────── */
    #queue { display: none; padding: 1.5rem; max-width: 700px; margin: 0 auto; }
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid #333;
    }
    .tab-btn {
      background: transparent;
      color: #666;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 6px 16px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #fff; }
    .tab-btn:hover:not(.active) { color: #aaa; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }
    #queue h1 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #333;
    }
    #status, #status-contest { color: #666; font-size: 11px; margin-bottom: 1rem; letter-spacing: 0.05em; }
    .card {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 0.75rem;
      border: 2px solid #fff;
      box-shadow: 3px 3px 0 #fff;
      margin-bottom: 1rem;
    }
    .card img { width: 100px; height: 75px; object-fit: cover; border: 1px solid #333; flex-shrink: 0; }
    .card-meta { flex: 1; font-size: 11px; }
    .card-meta .coords { color: #fff; margin-bottom: 4px; }
    .card-meta .date { color: #666; }
    .actions { display: flex; gap: 0.5rem; flex-shrink: 0; align-items: flex-start; }
    .btn-approve {
      background: #fff; color: #111;
      border: 1px solid #fff;
      padding: 4px 10px; font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .btn-reject {
      background: transparent; color: #fff;
      border: 1px solid #fff;
      padding: 4px 10px; font-size: 11px;
      cursor: pointer; font-family: inherit;
    }
    .btn-approve:hover { background: #ddd; }
    .btn-reject:hover { background: #222; }
    .btn-approve:disabled, .btn-reject:disabled { opacity: 0.3; cursor: default; }
    a { color: #fff; }

    /* ── Lightbox ────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 100%;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      border: 2px solid #fff;
    }
    #lightbox-actions { display: flex; gap: 0.75rem; }
    #lightbox-approve {
      background: #fff; color: #111;
      border: 2px solid #fff;
      padding: 10px 28px; font-family: inherit;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer;
    }
    #lightbox-approve:hover { background: #ddd; }
    #lightbox-reject {
      background: transparent; color: #fff;
      border: 2px solid #fff;
      padding: 10px 28px; font-family: inherit;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer;
    }
    #lightbox-reject:hover { background: #222; }
    #lightbox-close {
      position: absolute; top: 1rem; right: 1rem;
      background: transparent; color: #fff;
      border: none; font-size: 22px; cursor: pointer;
      line-height: 1; padding: 4px 8px;
    }
    #lightbox-close:hover { color: #ccc; }
    .card img { cursor: zoom-in; }

    /* ── Language toggle ─────────────────────────────── */
    #lang-toggle {
      position: fixed; top: 1rem; right: 1rem;
      background: transparent; color: #fff;
      border: 1px solid #fff; padding: 3px 10px;
      font-family: inherit; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; cursor: pointer; z-index: 100;
    }
    #lang-toggle:hover { background: #222; }
  </style>
</head>
<body>
  <button id="lang-toggle">EN</button>

  <div id="login-wrap">
    <div id="login">
      <h1>Lupa Admin ── Moderación</h1>
      <input type="password" id="pw-input" placeholder="Contraseña">
      <button id="pw-btn">Entrar</button>
      <div id="login-error"></div>
    </div>
  </div>

  <div id="queue">
    <h1>Lupa Admin ── Moderación</h1>
    <div class="tabs">
      <button class="tab-btn active" id="tab-reports" onclick="switchTab('reports')">Reportes</button>
      <button class="tab-btn" id="tab-contests" onclick="switchTab('contestaciones')">Contestaciones</button>
    </div>
    <div class="tab-pane active" id="pane-reports">
      <div id="status">Cargando...</div>
      <div id="cards"></div>
    </div>
    <div class="tab-pane" id="pane-contests">
      <div id="status-contest">Cargando...</div>
      <div id="cards-contest"></div>
    </div>
  </div>

  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-actions">
      <button id="lightbox-approve">✓ Aprobar</button>
      <button id="lightbox-reject">✗ Rechazar</button>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://lupa-submission.jmunson0711.workers.dev';

    const T = {
      es: {
        loginTitle:   'Lupa Admin ── Moderación',
        placeholder:  'Contraseña',
        enter:        'Entrar',
        queueTitle:   'Lupa Admin ── Reportes pendientes',
        loading:      'Cargando...',
        none:         'No hay reportes pendientes.',
        pending:      n => `${n} reporte(s) pendiente(s)`,
        wrongPw:      'Contraseña incorrecta.',
        approve:      '✓ Aprobar',
        reject:       '✗ Rechazar',
        langBtn:      'EN',
        contestTab:     'Contestaciones',
        reportTab:      'Reportes',
        approveContest: '✓ Aprobar',
        rejectContest:  '✗ Rechazar',
        noneContest:    'No hay contestaciones pendientes.',
        pendingContest: n => `${n} contestación(es) pendiente(s)`,
      },
      en: {
        loginTitle:   'Lupa Admin ── Moderation',
        placeholder:  'Password',
        enter:        'Enter',
        queueTitle:   'Lupa Admin ── Pending reports',
        loading:      'Loading...',
        none:         'No pending reports.',
        pending:      n => `${n} pending report(s)`,
        wrongPw:      'Wrong password.',
        approve:      '✓ Approve',
        reject:       '✗ Reject',
        langBtn:      'ES',
        contestTab:     'Contestations',
        reportTab:      'Reports',
        approveContest: '✓ Approve',
        rejectContest:  '✗ Reject',
        noneContest:    'No pending contestations.',
        pendingContest: n => `${n} pending contestation(s)`,
      },
    };

    let lang = localStorage.getItem('admin-lang') || 'es';
    let token = '';
    let reportRows = [];
    let contestationRows = [];

    function t(key, ...args) {
      const val = T[lang][key];
      return typeof val === 'function' ? val(...args) : val;
    }

    function applyLang() {
      document.getElementById('lang-toggle').textContent = t('langBtn');
      document.querySelector('#login h1').textContent    = t('loginTitle');
      document.getElementById('pw-input').placeholder   = t('placeholder');
      document.getElementById('pw-btn').textContent     = t('enter');
      document.querySelector('#queue h1').textContent   = t('queueTitle');
      document.querySelectorAll('#cards .btn-approve').forEach(b => b.textContent = t('approve'));
      document.querySelectorAll('#cards .btn-reject').forEach(b => b.textContent = t('reject'));
      document.querySelectorAll('#cards-contest .btn-approve').forEach(b => b.textContent = t('approveContest'));
      document.querySelectorAll('#cards-contest .btn-reject').forEach(b => b.textContent = t('rejectContest'));
      document.getElementById('tab-reports').textContent  = t('reportTab');
      document.getElementById('tab-contests').textContent = t('contestTab');
    }

    function switchTab(tab) {
      const isReports = tab === 'reports';
      document.getElementById('pane-reports').classList.toggle('active', isReports);
      document.getElementById('pane-contests').classList.toggle('active', !isReports);
      document.getElementById('tab-reports').classList.toggle('active', isReports);
      document.getElementById('tab-contests').classList.toggle('active', !isReports);
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'es' ? 'en' : 'es';
      localStorage.setItem('admin-lang', lang);
      applyLang();
      if (token) {
        renderQueue(reportRows);
        renderContestations(contestationRows);
      }
    });

    applyLang();

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-btn').click(); });

    document.getElementById('pw-btn').addEventListener('click', async () => {
      const candidate = document.getElementById('pw-input').value.trim();
      if (!candidate) return;
      const btn = document.getElementById('pw-btn');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      err.textContent = '';

      const res = await fetch(`${WORKER_URL}/admin/pending`, {
        headers: { 'Authorization': `Bearer ${candidate}` },
      });

      btn.disabled = false;
      if (res.status === 401) {
        err.textContent = t('wrongPw');
        document.getElementById('pw-input').select();
        return;
      }
      if (!res.ok) { err.textContent = `Error ${res.status}`; return; }

      token = candidate;
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('queue').style.display = 'block';
      reportRows = await res.json();
      renderQueue(reportRows);
      // Also load contestations
      const resContest = await fetch(`${WORKER_URL}/admin/contestations`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (resContest.ok) {
        contestationRows = await resContest.json();
        renderContestations(contestationRows);
      } else {
        document.getElementById('status-contest').textContent = `Error ${resContest.status}`;
      }
    });

    function renderQueue(rows) {
      const status = document.getElementById('status');
      const cards  = document.getElementById('cards');
      cards.innerHTML = '';
      status.textContent = rows.length === 0 ? t('none') : t('pending', rows.length);

      rows.forEach(row => {
        const date = new Date(row.submitted_at).toLocaleString(lang === 'es' ? 'es-AR' : 'en-US');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${esc(row.photo_url)}" alt="report photo" onclick="openLightbox('${esc(row.photo_url)}','${esc(row.id)}','report')">
          <div class="card-meta">
            <div class="coords">${esc(row.lat.toFixed(5))}, ${esc(row.lng.toFixed(5))}</div>
            <div class="date">${esc(date)}</div>
          </div>
          <div class="actions">
            <button class="btn-approve" data-id="${esc(row.id)}">${t('approve')}</button>
            <button class="btn-reject"  data-id="${esc(row.id)}">${t('reject')}</button>
          </div>
        `;
        cards.appendChild(card);
      });

      cards.querySelectorAll('.btn-approve').forEach(btn => {
        btn.addEventListener('click', () => doAction(btn.dataset.id, 'approve', btn));
      });
      cards.querySelectorAll('.btn-reject').forEach(btn => {
        btn.addEventListener('click', () => doAction(btn.dataset.id, 'reject', btn));
      });
    }

    async function doAction(id, action, btn) {
      const card = btn.closest('.card');
      card.querySelectorAll('button').forEach(b => b.disabled = true);
      const res = await fetch(`${WORKER_URL}/admin/${action}/${id}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.ok) {
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => {
          card.remove();
          const remaining = document.querySelectorAll('#cards .card').length;
          document.getElementById('status').textContent =
            remaining === 0 ? t('none') : t('pending', remaining);
        }, 300);
      } else {
        alert(`Error ${res.status}`);
        card.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }

    function renderContestations(rows) {
      const status = document.getElementById('status-contest');
      const cards  = document.getElementById('cards-contest');
      cards.innerHTML = '';
      status.textContent = rows.length === 0 ? t('noneContest') : t('pendingContest', rows.length);

      rows.forEach(row => {
        const date = new Date(row.submitted_at).toLocaleString(lang === 'es' ? 'es-AR' : 'en-US');
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${esc(row.photo_url)}" alt="contestation photo" onclick="openLightbox('${esc(row.photo_url)}','${esc(row.id)}','contest')">
          <div class="card-meta">
            <div class="coords">${esc(row.lat.toFixed(5))}, ${esc(row.lng.toFixed(5))}</div>
            <div class="date">${esc(date)}</div>
            <div class="date" style="color:#aaa;font-size:10px;">src: ${esc(row.source || 'whatsapp')}</div>
          </div>
          <div class="actions">
            <button class="btn-approve" data-id="${esc(row.id)}">${t('approveContest')}</button>
            <button class="btn-reject"  data-id="${esc(row.id)}">${t('rejectContest')}</button>
          </div>
        `;
        cards.appendChild(card);
      });

      cards.querySelectorAll('.btn-approve').forEach(btn => {
        btn.addEventListener('click', () => doContestAction(btn.dataset.id, 'approve', btn));
      });
      cards.querySelectorAll('.btn-reject').forEach(btn => {
        btn.addEventListener('click', () => doContestAction(btn.dataset.id, 'reject', btn));
      });
    }

    // ── Lightbox ──────────────────────────────────────
    const lightbox        = document.getElementById('lightbox');
    const lightboxImg     = document.getElementById('lightbox-img');
    const lightboxApprove = document.getElementById('lightbox-approve');
    const lightboxReject  = document.getElementById('lightbox-reject');

    function openLightbox(photoUrl, id, type) {
      lightboxImg.src = photoUrl;
      lightbox.dataset.id   = id;
      lightbox.dataset.type = type;
      lightboxApprove.textContent = type === 'contest' ? t('approveContest') : t('approve');
      lightboxReject.textContent  = type === 'contest' ? t('rejectContest')  : t('reject');
      lightbox.classList.add('open');
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    async function lightboxAction(action) {
      const { id, type } = lightbox.dataset;
      lightboxApprove.disabled = true;
      lightboxReject.disabled  = true;
      const endpoint = type === 'contest'
        ? `${WORKER_URL}/admin/${action}-contest/${id}`
        : `${WORKER_URL}/admin/${action}/${id}`;
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.ok) {
        closeLightbox();
        // Mirror the card removal from the list
        const selector = type === 'contest' ? '#cards-contest' : '#cards';
        const cardBtn = document.querySelector(`${selector} [data-id="${id}"]`);
        if (cardBtn) {
          const card = cardBtn.closest('.card');
          card.style.transition = 'opacity 0.3s';
          card.style.opacity = '0';
          setTimeout(() => {
            card.remove();
            const remaining = document.querySelectorAll(`${selector} .card`).length;
            const statusEl = type === 'contest'
              ? document.getElementById('status-contest')
              : document.getElementById('status');
            statusEl.textContent = remaining === 0
              ? t(type === 'contest' ? 'noneContest' : 'none')
              : t(type === 'contest' ? 'pendingContest' : 'pending', remaining);
          }, 300);
        }
      } else {
        alert(`Error ${res.status}`);
      }
      lightboxApprove.disabled = false;
      lightboxReject.disabled  = false;
    }

    lightboxApprove.addEventListener('click', () => lightboxAction('approve'));
    lightboxReject.addEventListener('click',  () => lightboxAction('reject'));

    async function doContestAction(id, action, btn) {
      const card = btn.closest('.card');
      card.querySelectorAll('button').forEach(b => b.disabled = true);
      const res = await fetch(`${WORKER_URL}/admin/${action}-contest/${id}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.ok) {
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => {
          card.remove();
          const remaining = document.querySelectorAll('#cards-contest .card').length;
          document.getElementById('status-contest').textContent =
            remaining === 0 ? t('noneContest') : t('pendingContest', remaining);
        }, 300);
      } else {
        alert(`Error ${res.status}`);
        card.querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }
  </script>
</body>
</html>
