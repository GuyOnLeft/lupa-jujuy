name: Regenerate approved_reports.json

on:
  repository_dispatch:
    types: [regenerate-map]
  workflow_dispatch: {}

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch approved reports from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -sf \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/community_reports?status=eq.approved&order=submitted_at.asc&select=id,lat,lng,photo_url,submitted_at,source" \
            | python3 -c "
          import sys, json
          rows = json.load(sys.stdin)
          out = [{'id': r['id'], 'latitude': r['lat'], 'longitude': r['lng'],
                  'photo_url': r['photo_url'], 'submitted_at': r['submitted_at'],
                  'source': r['source']} for r in rows]
          print(json.dumps(out, indent=2))
          " > data/output/approved_reports.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/approved_reports.json
          git diff --staged --quiet || git commit -m "chore: regenerate approved_reports.json [skip ci]"
          git push
